<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>🔑 관리자</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; }
    input, button { padding: 8px; margin: 4px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    .section { background: #f9f9f9; padding: 16px; border-radius: 8px; margin: 16px 0; }
  </style>
</head>
<body>
  <h1>🔑 관리자 패널</h1>
  <div class="section">
    <b>관리자 키</b><br>
    <input type="password" id="adminKey" placeholder="관리자 키 입력">
  </div>
  <div class="section">
    <b>당첨자 추가</b><br>
    <input id="winnerId" placeholder="치지직 채널 ID">
    <input id="winnerNick" placeholder="닉네임">
    <button onclick="addWinner()">추가</button>
  </div>
  <div class="section">
    <b>기프티콘 코드 등록</b><br>
    <input id="gifticonId" placeholder="치지직 채널 ID">
    <input id="gifticonCode" placeholder="기프티콘 코드">
    <button onclick="addGifticon()">등록</button>
  </div>
  <button onclick="loadStatus()">📊 현황 새로고침</button>
  <table id="statusTable">
    <tr><th>채널 ID</th><th>닉네임</th><th>총 기프티콘</th><th>수령 완료</th><th>삭제</th></tr>
  </table>
  <script>
    const API = 'http://localhost:3000';
    const key = () => document.getElementById('adminKey').value;
    const headers = () => ({ 'Content-Type': 'application/json', 'x-admin-key': key() });
    async function addWinner() {
      const r = await fetch(`${API}/admin/winners`, {
        method: 'POST', headers: headers(),
        body: JSON.stringify({ chzzk_id: winnerId.value, nickname: winnerNick.value })
      });
      alert((await r.json()).ok ? '추가 완료!' : '실패');
      loadStatus();
    }
    async function addGifticon() {
      const r = await fetch(`${API}/admin/gifticons`, {
        method: 'POST', headers: headers(),
        body: JSON.stringify({ winner_chzzk_id: gifticonId.value, code: gifticonCode.value })
      });
      alert((await r.json()).ok ? '등록 완료!' : '실패');
      loadStatus();
    }
    async function loadStatus() {
      const r = await fetch(`${API}/admin/status`, { headers: headers() });
      const data = await r.json();
      const table = document.getElementById('statusTable');
      table.innerHTML = '<tr><th>채널 ID</th><th>닉네임</th><th>총 기프티콘</th><th>수령 완료</th><th>삭제</th></tr>';
      for (const w of data) {
        table.innerHTML += `<tr>
          <td>${w.chzzk_id}</td><td>${w.nickname}</td>
          <td>${w.total}</td><td>${w.claimed}</td>
          <td><button onclick="deleteWinner('${w.chzzk_id}')">삭제</button></td>
        </tr>`;
      }
    }
    async function deleteWinner(id) {
      if (!confirm('삭제할까요?')) return;
      await fetch(`${API}/admin/winners/${id}`, { method: 'DELETE', headers: headers() });
      loadStatus();
    }
  </script>
</body>
</html>
